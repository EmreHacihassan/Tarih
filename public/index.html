<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <title>AI 4 Social Good Club | Uygun Saat Bulucu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;700;800&display=swap" rel="stylesheet" />
    <link href="./styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="bg-layer" aria-hidden="true"></div>

    <div class="page-shell">
      <header class="app-header">
        <div class="brand">
          <div class="logo-wrap" aria-hidden="true">
            <img class="logo-image" src="./assets/club-logo.png" alt="AI 4 Social Good Club logosu" width="112" height="112" />
          </div>
          <div class="titles">
            <h1 class="app-title">AI 4 SOCIAL GOOD CLUB</h1>
            <div class="subtitle">Kulüp İçin Uygun Saat Koordinasyon Platformu</div>
          </div>
        </div>
        <div class="file-path-hint" id="filePathHint" title="Veri dosyası yolu sunucu konsolunda yazıyor.">Kulüp takvimi dosya tabanlı olarak kaydedilir</div>
      </header>

      <section class="controls">
        <form id="addForm" class="add-form">
          <div class="field">
            <label for="name">Üye</label>
            <input type="text" id="name" placeholder="Örn: Ayşe" required />
          </div>

          <div class="field">
            <label for="day">Gün</label>
            <select id="day" required>
              <option value="0">Pazartesi</option>
              <option value="1">Salı</option>
              <option value="2">Çarşamba</option>
              <option value="3">Perşembe</option>
              <option value="4">Cuma</option>
              <option value="5">Cumartesi</option>
              <option value="6">Pazar</option>
            </select>
          </div>

          <div class="field">
            <label for="start">Başlangıç</label>
            <input type="time" id="start" value="09:00" required />
          </div>

          <div class="field">
            <label for="end">Bitiş</label>
            <input type="time" id="end" value="10:00" required />
          </div>

          <button type="submit" class="btn">Etkinlik Ekle</button>
        </form>

        <div class="legend">
          <span class="legend-box green"></span> Müsait
          <span class="legend-box red"></span> Meşgul
        </div>

        <div class="importer">
          <div class="field">
            <label for="csvFile">CSV İçe Aktar</label>
            <input type="file" id="csvFile" accept=".csv" />
          </div>
          <button type="button" class="btn" id="importBtn" title="CSV dosyasını içe aktar">İçe aktar</button>
          <button type="button" class="btn" id="exportBtn" title="Mevcut takvimi CSV olarak indir">Dışa aktar</button>
          <a href="#" id="sampleCsv" class="sample-link" title="Örnek CSV indir">Örnek CSV</a>
        </div>
      </section>

      <main class="week">
        <div class="week-grid" id="weekGrid"></div>
      </main>

      <footer class="app-footer">
        <div>AI 4 SOCIAL GOOD CLUB haftalık takvimi. 00:00 -> 23:59 arası uygunluk izlenir.</div>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
